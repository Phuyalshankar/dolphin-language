<!DOCTYPE html>
<html>
<head>
    <title>Dolphin Login</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #1e1e2e;
            color: #cdd6f4;
        }
        .card {
            background: #313244;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 300px;
            text-align: center;
        }
        h2 { color: #f5c2e7; margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #45475a;
            border-radius: 8px;
            background: #1e1e2e;
            color: #cdd6f4;
            font-size: 15px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #cba6f7;
            color: #11111b;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #b4befe; }
    </style>
</head>
<body>
    <div class='card'>
        <h2>Dolphin IoT Login</h2>
        <form action='/login' method='POST'>
            <input type='text' name='user' placeholder='Username' required>
            <input type='password' name='pass' placeholder='Password' required>
            <button type='submit'>Login</button>
        </form>
    </div>
</body>
</html>
